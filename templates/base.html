{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>{% block title %}Mateusz | Portfolio{% endblock %}</title>

<link rel="icon" type="image/png" href="{% static 'images/M_Favicon.png' %}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Personal portfolio of Mateusz Hałdaś.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/main.css' %}">

{% block extra_css %}{% endblock %}
</head>


<body>


<header class="navbar">

<div class="navbar-left">

<a href="/" class="logo">
<img src="{% static 'images/M_LOGO.png' %}" alt="Mateusz logo">
<span>My name is Matt.</span>
</a>

</div>


<nav class="nav" id="nav-menu">

<a href="/">Home</a>
<a href="/projects/">Projects</a>
<a href="/blog/">Blog</a>
<a href="/industrial/">Industrial</a>
<a href="/about/">About</a>
<a href="/contact/">Contact</a>

</nav>


<div class="navbar-right">

<a href="https://www.linkedin.com/in/mateusz-ha%C5%82da%C5%9B-914aa0197/" target="_blank" rel="noopener noreferrer">
<img src="{% static 'icons/linkedin.svg' %}" alt="LinkedIn">
</a>

<a href="https://github.com/Ex333" target="_blank" rel="noopener noreferrer">
<img src="{% static 'icons/github.svg' %}" alt="GitHub">
</a>

<button class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</button>

</div>

</header>



<main class="page">
{% block content %}{% endblock %}
</main>



<footer class="footer">

<div class="footer-inner">

<div class="footer-copy">
© 2026 Mateusz Hałdaś · Portfolio
</div>

<div class="footer-links">
<a href="{% url 'imprint' %}">Imprint</a>
<a href="{% url 'privacy_policy' %}">Privacy Policy</a>
</div>

</div>

</footer>



<script>

const hamburger = document.getElementById("hamburger");
const nav = document.getElementById("nav-menu");

hamburger.addEventListener("click", () => {
nav.classList.toggle("active");
hamburger.classList.toggle("active");
});

</script>


</body>
</html>
